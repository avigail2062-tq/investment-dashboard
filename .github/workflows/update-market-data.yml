name: Update Market Data

on:
  schedule:
    # Morning: 7:30 AM Israel Time (4:30 AM UTC) - pre-market
    - cron: '30 4 * * 1-5'
    # Evening: 10:30 PM Israel Time (7:30 PM UTC) - after market close
    - cron: '30 19 * * 1-5'
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Commit and push
        run: |
          git config user.name "Market Data Bot"
          git config user.email "bot@investment-dashboard.github.io"
          git add data/
          git diff --staged --quiet || git commit -m "📊 data: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
